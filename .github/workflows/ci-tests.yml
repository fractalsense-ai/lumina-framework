name: CI Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Install package in editable mode with all extras so `lumina` is
          # importable by tests and by subprocess calls (e.g. manifest_integrity).
          # The `providers` extra brings in openai + anthropic for provider tests.
          python -m pip install -e '.[providers,sqlite,passwords,nlp,math,retrieval,calendar,dev]'
          python -m spacy download en_core_web_sm

      - name: Secret hygiene check
        run: bash scripts/check-local-secret-hygiene.sh

      # Coverage ratchet history:
      #   ~69.96% baseline (PR #37) → 72% (PR #40) → 82% (PR O, 2026-06-19)
      #   → 85% (PR Z, 2026-06-19, after PRs S-Y: admin ops, interceptors,
      #     pipeline commands, runtime helpers, coercion, SQLite persistence)
      # Current baseline: ~85% on Python 3.13.
      # do not lower this threshold.
      - name: Backend tests + coverage gate (>=85%)
        run: >
          python -m pytest tests -q
          --cov=lumina
          --cov-report=term-missing
          --cov-fail-under=85

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/web
        run: npm ci

      - name: Frontend unit tests
        working-directory: src/web
        run: npm run test:unit

      - name: Frontend coverage report (non-blocking)
        working-directory: src/web
        run: npm run test:coverage
        continue-on-error: true

      - name: Install Playwright browser
        working-directory: src/web
        run: npm exec playwright install chromium

      - name: Frontend e2e smoke tests
        working-directory: src/web
        run: npm run test:e2e
